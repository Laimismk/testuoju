<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LT muzikos skaneris</title>
  <style>
    /* CSS Kintamieji temoms */
    :root {
      /* Tamsi tema */
      --bg: #000000;
      --text-color: #ffffff;
      --accent-color: #00d2ff;
      --accent-glow: rgba(0, 210, 255, 0.5);
      
      /* Laikmatis ir mygtukas: juodas tekstas ant juodo fono, tik švytėjimas matosi */
      --timer-text: #000000;
      --timer-glow: #00d2ff; 
    }

    body.light-theme {
      /* Šviesi tema */
      --bg: #ffffff; /* Padarome pilnai baltą, kad perėjimas būtų idealiai sklandus */
      --text-color: #1a1a1a;
      --accent-color: #00d2ff;
      --accent-glow: rgba(0, 210, 255, 0.3);
      
      /* Laikmatis ir mygtukas: baltas tekstas ant balto fono, matosi tik švytėjimas */
      --timer-text: #ffffff;
      --timer-glow: #00d2ff;
    }

    body {
      background: var(--bg);
      color: var(--text-color);
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* Temos perjungiklis */
    .theme-switch-wrapper {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      z-index: 100;
    }

    .theme-switch {
      display: inline-block;
      height: 30px;
      position: relative;
      width: 54px;
    }

    .theme-switch input {
      display: none;
    }

    .slider {
      background-color: #333;
      bottom: 0;
      cursor: pointer;
      left: 0;
      position: absolute;
      right: 0;
      top: 0;
      transition: .4s;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .slider:before {
      background-color: #fff;
      bottom: 2px;
      content: "";
      height: 22px;
      left: 3px;
      position: absolute;
      transition: .4s;
      width: 22px;
    }

    .slider.round {
      border-radius: 34px;
    }

    .slider.round:before {
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #ccc;
      border-color: rgba(0,0,0,0.2);
    }

    input:checked + .slider:before {
      transform: translateX(22px);
      background-color: #1a1a1a;
    }

    /* Pagrindiniai elementai */
    #mainImage {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 600px;
      border-radius: 20px;
      box-shadow: 0 10px 30px var(--accent-glow);
    }

    #pradedamButton {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, var(--accent-color), #3a7bd5);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px var(--accent-glow);
      transition: all 0.3s ease;
    }

    #pradedamButton:hover {
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    #tekstas {
      text-align: center;
      margin-top: 80px;
      font-size: 24px;
      font-weight: 300;
      color: var(--accent-color);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    #controls {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: none;
      width: 100%;
      z-index: 20;
    }

    #controls button {
      width: 80%;
      max-width: 250px;
      height: 55px;
      margin: 15px auto; /* Padidinam tarpą, kad atrodytų gražiau su ekvalaizeriu tarp jų */
      display: block;
      padding: 10px 20px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #grotiButton.groti {
      background: var(--accent-color);
      color: #fff;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    #grotiButton.stabdyti {
      background: #F44336;
      color: #fff;
      box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
    }

    #skanavimasIsNaujo {
      background: transparent;
      color: var(--timer-text);
      border: 2px solid var(--timer-glow) !important;
      text-shadow: 0 0 5px var(--timer-glow), 0 0 15px var(--timer-glow);
      box-shadow: 0 0 15px var(--accent-glow), inset 0 0 10px var(--accent-glow);
    }

    #controls button:hover {
      transform: scale(1.05);
    }

    #videoContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 2;
      pointer-events: none;
    }

    #target {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 250px;
      height: 250px;
      border: 3px solid var(--accent-color);
      border-radius: 20px;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px var(--accent-glow), inset 0 0 20px var(--accent-glow);
      animation: pulsate 2s infinite ease-in-out;
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      transform-origin: center;
    }

    #target.scanned {
      border-color: #fff;
      background-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 40px #fff, inset 0 0 40px #fff;
      animation: none;
    }

    @keyframes pulsate {
      0% { opacity: 0.8; box-shadow: 0 0 10px var(--accent-glow); }
      50% { opacity: 1; box-shadow: 0 0 30px var(--accent-color), inset 0 0 20px var(--accent-color); }
      100% { opacity: 0.8; box-shadow: 0 0 10px var(--accent-glow); }
    }

    #overlayText {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      z-index: 10;
      display: none;
    }

    /* Dabar vizualizacija užima visą ekraną, kad galėtume tiksliai sulygiuoti horizontą */
    #audioVisualizer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: none;
    }

    #timer {
      position: absolute;
      top: 30%; /* Pakeltas šiek tiek aukščiau, nes ekvalaizeris eina per mygtukus */
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 90px;
      font-weight: 700;
      color: var(--timer-text);
      text-shadow: 
        0 0 5px var(--timer-glow),
        0 0 15px var(--timer-glow), 
        0 0 30px var(--timer-glow);
      z-index: 10;
      display: none;
      font-variant-numeric: tabular-nums;
    }

  </style>
</head>
<body>

  <div class="theme-switch-wrapper">
    <label class="theme-switch" for="checkbox">
      <input type="checkbox" id="checkbox" />
      <div class="slider round"></div>
    </label>
  </div>

  <img id="mainImage" src="main.png" alt="Main Image" onerror="this.style.display='none'"/>
  <button id="pradedamButton">Pradedam žaidimą</button>
  <h2 id="tekstas" style="display: none;">Pasiruošę nuskaityti QR kodą...</h2>
  
  <div id="videoContainer" style="display: none;">
    <video id="video" autoplay playsinline></video>
    <div id="overlay">
        <div id="target"></div>
    </div>      
    <div id="overlayText">Ieškome kodo</div>
  </div>

  <div id="timer">0:00</div>
  
  <div id="controls">
    <button id="grotiButton" class="groti">Groti</button>
    <button id="skanavimasIsNaujo">Kita daina</button>
  </div>
  
  <audio id="audio" style="display: none;" crossorigin="anonymous"></audio>
  <canvas id="audioVisualizer"></canvas>

  <script>
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');
    const audioElement = document.getElementById('audio');
    const tekstasElement = document.getElementById('tekstas');
    const pradedamButton = document.getElementById('pradedamButton');
    const grotiButton = document.getElementById('grotiButton');
    const skanavimasIsNaujo = document.getElementById('skanavimasIsNaujo');
    const controls = document.getElementById('controls');
    const mainImage = document.getElementById('mainImage');
    const target = document.getElementById('target');
    const timerElement = document.getElementById('timer');
    const visualizerCanvas = document.getElementById('audioVisualizer');
    
    // Temos perjungimo logika
    const toggleSwitch = document.getElementById('checkbox');
    
    toggleSwitch.addEventListener('change', function(e) {
      if (e.target.checked) {
        document.body.classList.add('light-theme');
      } else {
        document.body.classList.remove('light-theme');
      }
    });

    const canvasContext = visualizerCanvas.getContext('2d');

    let audioContext;
    let analyser;
    let source;
    let dataArray;
    let bufferLength;
    let barcodeDetector;
    let skanavimasPradetas = false;
    let muzikaGroja = false;
    let visualizerAnimationId;

    pradedamButton.addEventListener('click', () => {
      mainImage.style.display = 'none';
      pradedamButton.style.display = 'none';
      tekstasElement.style.display = 'block';
      skanavimasPradetas = true;
      pradetiVideo();
      initAudio();
    });

    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audioElement);
            
            source.connect(analyser);
            analyser.connect(audioContext.destination);

            analyser.fftSize = 64;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }
    }

    function pradetiVideo() {
        const overlayText = document.getElementById('overlayText');
        tekstasElement.style.display = 'none';
  
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { 
                video: { facingMode: { exact: "environment" } },
                audio: false
            };
            const fallbackConstraints = { video: { facingMode: "environment" } };

            navigator.mediaDevices.getUserMedia(constraints).catch(() => {
                return navigator.mediaDevices.getUserMedia(fallbackConstraints);
            })
            .then(stream => {
                video.srcObject = stream;
                if (!barcodeDetector) {
                    if ('BarcodeDetector' in window) {
                        barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
                    } else {
                        alert("Jūsų naršyklė nepalaiko barkodų skanavimo.");
                    }
                }
                videoContainer.style.display = 'block';
                overlayText.style.display = 'block';
                skanavimasPradetas = true;
            })
            .catch(err => {
                tekstasElement.style.display = 'block';
                tekstasElement.textContent = "Nepavyko įjungti kameros.";
            });
        }
    }

    function detectCode() {
        if (!barcodeDetector || !skanavimasPradetas || video.readyState !== video.HAVE_ENOUGH_DATA) return;

        barcodeDetector.detect(video)
            .then(codes => {
                if (codes.length === 0) return;

                const barcode = codes[0];
                skanavimasPradetas = false;

                if (barcode.cornerPoints && barcode.cornerPoints.length === 4) {
                    const vw = video.videoWidth;
                    const vh = video.videoHeight;
                    const cw = videoContainer.offsetWidth;
                    const ch = videoContainer.offsetHeight;

                    const videoRatio = vw / vh;
                    const containerRatio = cw / ch;

                    let renderWidth, renderHeight, offsetX = 0, offsetY = 0;

                    if (containerRatio > videoRatio) {
                        renderWidth = cw;
                        renderHeight = cw / videoRatio;
                        offsetY = (ch - renderHeight) / 2;
                    } else {
                        renderHeight = ch;
                        renderWidth = ch * videoRatio;
                        offsetX = (cw - renderWidth) / 2;
                    }

                    const pts = barcode.cornerPoints.map(p => ({
                        x: (p.x / vw) * renderWidth + offsetX,
                        y: (p.y / vh) * renderHeight + offsetY
                    }));

                    const cx = (pts[0].x + pts[1].x + pts[2].x + pts[3].x) / 4;
                    const cy = (pts[0].y + pts[1].y + pts[2].y + pts[3].y) / 4;
                    
                    const dx = pts[1].x - pts[0].x;
                    const dy = pts[1].y - pts[0].y;
                    const width = Math.sqrt(dx*dx + dy*dy);
                    
                    const dx2 = pts[3].x - pts[0].x;
                    const dy2 = pts[3].y - pts[0].y;
                    const height = Math.sqrt(dx2*dx2 + dy2*dy2);

                    const angle = Math.atan2(dy, dx) * (180 / Math.PI);

                    const padding = 30;
                    target.style.width = `${width + padding}px`;
                    target.style.height = `${height + padding}px`;
                    target.style.left = `${cx}px`;
                    target.style.top = `${cy}px`;
                    target.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
                }

                target.classList.add('scanned');

                setTimeout(() => {
                    video.srcObject.getTracks().forEach(track => track.stop());
                    videoContainer.style.display = 'none';
                    controls.style.display = 'block';
                    visualizerCanvas.style.display = 'block';
                    timerElement.style.display = 'block';
                    timerElement.textContent = "0:00";

                    audioElement.src = barcode.rawValue;
                    audioElement.load();

                    grotiButton.classList.remove('stabdyti');
                    grotiButton.classList.add('groti');
                    grotiButton.textContent = "Groti";
                }, 300);
            })
            .catch(err => console.error(err));
    }

    audioElement.addEventListener('timeupdate', () => {
        const minutes = Math.floor(audioElement.currentTime / 60);
        const seconds = Math.floor(audioElement.currentTime % 60);
        timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    });

    audioElement.addEventListener('ended', () => {
        muzikaGroja = false;
        grotiButton.classList.remove('stabdyti');
        grotiButton.classList.add('groti');
        grotiButton.textContent = "Groti";
        cancelAnimationFrame(visualizerAnimationId);
        canvasContext.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        timerElement.textContent = "0:00";
    });

    function drawVisualizer() {
        if (!muzikaGroja) return;

        visualizerCanvas.width = window.innerWidth;
        visualizerCanvas.height = window.innerHeight; // Dabar per visą ekraną

        const WIDTH = visualizerCanvas.width;
        const HEIGHT = visualizerCanvas.height;
        
        // Randame tikslią poziciją tarp dviejų mygtukų, kad nustatytume horizontą
        const btnGroti = grotiButton.getBoundingClientRect();
        const btnKita = skanavimasIsNaujo.getBoundingClientRect();
        let centerY = HEIGHT * 0.75; // Atsarginė reikšmė, jei mygtukai nematomi

        if (btnGroti.height > 0 && btnKita.height > 0) {
            // Vidurys yra lygiai tarp pirmo mygtuko apačios ir antro mygtuko viršaus
            centerY = btnGroti.bottom + (btnKita.top - btnGroti.bottom) / 2;
        }
        
        const isLight = document.body.classList.contains('light-theme');
        const accentColor = '#00d2ff';
        const darkAccentColor = '#0022aa';
        const bgThemeColor = isLight ? '#ffffff' : '#000000';

        canvasContext.clearRect(0, 0, WIDTH, HEIGHT);
        analyser.getByteFrequencyData(dataArray);

        // Subtili linija horizonte
        canvasContext.fillStyle = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
        canvasContext.fillRect(0, centerY, WIDTH, 1);

        const barWidth = (WIDTH / bufferLength) * 2.5; 
        let x = 0;

        // Kad vizualizacija nesiremtų į patį ekrano viršų, ribojame maksimalų aukštį
        const maxBarHeight = HEIGHT * 0.4; 

        for (let i = 0; i < bufferLength; i++) {
            let barHeight = (dataArray[i] / 255) * maxBarHeight;
            
            if (barHeight > 0) {
                // --- VIRŠUTINIS STULPELIS ---
                // Prasideda nuo fono spalvos (juoda/balta), viduryje neoninė, viršuje tamsiai mėlyna
                const grad = canvasContext.createLinearGradient(0, centerY, 0, centerY - barHeight);
                grad.addColorStop(0, bgThemeColor); 
                grad.addColorStop(0.3, accentColor);
                grad.addColorStop(1, darkAccentColor);

                canvasContext.fillStyle = grad;
                canvasContext.fillRect(x, centerY - barHeight, barWidth - 4, barHeight);

                // --- APATINIS ATSPINDYS ---
                // Prasideda nuo fono spalvos, trumpai blykšteli neonine ir grįžta į fono spalvą
                canvasContext.globalAlpha = 0.6;
                const reflectHeight = barHeight * 0.5;
                const reflectGrad = canvasContext.createLinearGradient(0, centerY, 0, centerY + reflectHeight);
                
                reflectGrad.addColorStop(0, bgThemeColor);
                reflectGrad.addColorStop(0.4, accentColor);
                reflectGrad.addColorStop(1, bgThemeColor); // Ištirpsta fone
                
                canvasContext.fillStyle = reflectGrad;
                canvasContext.fillRect(x, centerY, barWidth - 4, reflectHeight);
                canvasContext.globalAlpha = 1.0;
            }
            x += barWidth;
        }

        visualizerAnimationId = requestAnimationFrame(drawVisualizer);
    }

    grotiButton.addEventListener('click', () => {
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }

        if (muzikaGroja) {
            audioElement.pause();
            muzikaGroja = false;
            grotiButton.classList.remove('stabdyti');
            grotiButton.classList.add('groti');
            grotiButton.textContent = "Groti";
            cancelAnimationFrame(visualizerAnimationId);
            canvasContext.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        } else {
            audioElement.play()
            .then(() => {
                muzikaGroja = true;
                grotiButton.classList.remove('groti');
                grotiButton.classList.add('stabdyti');
                grotiButton.textContent = "Stabdyti";
                drawVisualizer();
            })
            .catch(err => alert("Nepavyko paleisti garso failo."));
        }
    });

    skanavimasIsNaujo.addEventListener('click', () => {
        controls.style.display = 'none';
        visualizerCanvas.style.display = 'none';
        timerElement.style.display = 'none';
        videoContainer.style.display = 'block';

        if (muzikaGroja) {
            audioElement.pause();
            muzikaGroja = false;
            cancelAnimationFrame(visualizerAnimationId);
        }
        
        if (canvasContext) {
            canvasContext.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        }

        audioElement.currentTime = 0;
        timerElement.textContent = "0:00";

        target.classList.remove('scanned');
        target.style.width = '250px';
        target.style.height = '250px';
        target.style.left = '50%';
        target.style.top = '50%';
        target.style.transform = 'translate(-50%, -50%)';

        pradetiVideo();
    });

    setInterval(detectCode, 150);
  </script>
</body>
</html>
