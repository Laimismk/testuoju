<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LT muzikos skaneris</title>
  <style>
    body {
      background: radial-gradient(circle at center, #0a1128 0%, #000000 100%);
      color: #fff;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden; /* Kad neatsirastų slankjuosčių nuo ekvalaizerio */
    }

    #mainImage {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 600px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
    }

    #pradedamButton {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #00d2ff, #3a7bd5);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
      transition: all 0.3s ease;
    }

    #pradedamButton:hover {
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.6);
    }

    #tekstas {
      text-align: center;
      margin-top: 40px;
      font-size: 24px;
      font-weight: 300;
      color: #00d2ff;
      text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
    }

    #controls {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: none;
      width: 100%;
      z-index: 20;
    }

    #controls button {
      width: 80%;
      max-width: 250px;
      height: 55px;
      margin: 10px auto;
      display: block;
      padding: 10px 20px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #grotiButton.groti {
      background: #4CAF50;
      color: #fff;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    }

    #grotiButton.stabdyti {
      background: #F44336;
      color: #fff;
      box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
    }

    #skanavimasIsNaujo {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
      backdrop-filter: blur(5px);
    }

    #controls button:hover {
      transform: scale(1.05);
    }

    #videoContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 2;
      pointer-events: none;
    }

    /* Modernus skenavimo kvadratas */
    #target {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 250px;
      height: 250px;
      border: 3px solid #00d2ff;
      border-radius: 20px;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.5), inset 0 0 20px rgba(0, 210, 255, 0.3);
      animation: pulsate 2s infinite ease-in-out;
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Efektas kai pagaunamas barkodas */
    #target.scanned {
      width: 180px;
      height: 180px;
      border-color: #fff;
      background-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 50px #fff, inset 0 0 50px #fff;
      animation: none;
    }

    @keyframes pulsate {
      0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; box-shadow: 0 0 30px rgba(0, 210, 255, 0.8), inset 0 0 30px rgba(0, 210, 255, 0.5); }
      100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
    }

    #overlayText {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      z-index: 10;
      display: none;
    }

    #audioVisualizer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%; /* Vizualizacija užima apatinę ekrano dalį */
      z-index: 1;
      display: none;
    }

    /* Didelis grojimo laikas */
    #timer {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 90px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 30px rgba(0, 210, 255, 0.8);
      z-index: 10;
      display: none;
      font-variant-numeric: tabular-nums; /* Kad skaičiai nešokinėtų */
    }

  </style>
</head>
<body>
  <img id="mainImage" src="main.png" alt="Main Image" onerror="this.style.display='none'"/>
  <button id="pradedamButton">Pradedam žaidimą</button>
  <h2 id="tekstas" style="display: none;">Pasiruošę nuskaityti QR kodą...</h2>
  
  <div id="videoContainer" style="display: none;">
    <video id="video" autoplay playsinline></video>
    <div id="overlay">
        <div id="target"></div>
    </div>      
    <div id="overlayText">Ieškome kodo</div>
  </div>

  <div id="timer">0:00</div>
  
  <div id="controls">
    <button id="grotiButton" class="groti">Groti</button>
    <button id="skanavimasIsNaujo" class="skanavimasIsNaujo">Skanuoti iš naujo</button>
  </div>
  
  <audio id="audio" style="display: none;" crossorigin="anonymous"></audio>
  <canvas id="audioVisualizer"></canvas>

  <script>
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');
    const audioElement = document.getElementById('audio');
    const tekstasElement = document.getElementById('tekstas');
    const pradedamButton = document.getElementById('pradedamButton');
    const grotiButton = document.getElementById('grotiButton');
    const skanavimasIsNaujo = document.getElementById('skanavimasIsNaujo');
    const controls = document.getElementById('controls');
    const mainImage = document.getElementById('mainImage');
    const target = document.getElementById('target');
    const timerElement = document.getElementById('timer');
    const visualizerCanvas = document.getElementById('audioVisualizer');

    const canvasContext = visualizerCanvas.getContext('2d');

    // Audio API kintamieji
    let audioContext;
    let analyser;
    let source;
    let dataArray;
    let bufferLength;

    let barcodeDetector;
    let skanavimasPradetas = false;
    let muzikaGroja = false;
    let visualizerAnimationId;

    // Pradėti skanavimą
    pradedamButton.addEventListener('click', () => {
      mainImage.style.display = 'none';
      pradedamButton.style.display = 'none';
      tekstasElement.style.display = 'block';
      skanavimasPradetas = true;
      pradetiVideo();
      initAudio(); // Inicijuojame AudioContext vartotojo veiksmo metu
    });

    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audioElement);
            
            source.connect(analyser);
            analyser.connect(audioContext.destination);

            analyser.fftSize = 64; // Mažesnis skaičius - storesni vizualizacijos stulpeliai
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }
    }

    // Pradėti vaizdo srautą
    function pradetiVideo() {
        const overlayText = document.getElementById('overlayText');
        tekstasElement.style.display = 'none'; // Paslepiam viršutinį tekstą, kai kamera įjungta
  
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { 
                video: { facingMode: { exact: "environment" } },
                audio: false
            };
            
            // Fallback, jei neras galinės kameros
            const fallbackConstraints = { video: { facingMode: "environment" } };

            navigator.mediaDevices.getUserMedia(constraints).catch(() => {
                return navigator.mediaDevices.getUserMedia(fallbackConstraints);
            })
            .then(stream => {
                video.srcObject = stream;
                if (!barcodeDetector) {
                    // Patikriname ar naršyklė palaiko BarcodeDetector API
                    if ('BarcodeDetector' in window) {
                        barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
                    } else {
                        alert("Jūsų naršyklė nepalaiko barkodų skanavimo. Pabandykite Chrome Android sistemose.");
                    }
                }
                videoContainer.style.display = 'block';
                overlayText.style.display = 'block';
                skanavimasPradetas = true;
            })
            .catch(err => {
                tekstasElement.style.display = 'block';
                tekstasElement.textContent = "Nepavyko įjungti kameros.";
                console.error("Klaida įjungiant kamerą:", err);
            });
        }
    }

    
    // Nuskaityti QR kodus
    function detectCode() {
        if (!barcodeDetector || !skanavimasPradetas || video.readyState !== video.HAVE_ENOUGH_DATA) return;

        barcodeDetector.detect(video)
            .then(codes => {
                if (codes.length === 0) return;

                for (const barcode of codes) {
                    skanavimasPradetas = false;
                    console.log("QR kodas:", barcode.rawValue);

                    // Užfiksavimo (Morph) animacija ir šviesos efektas
                    target.classList.add('scanned');

                    // Palaukiam pusę sekundės, kad vartotojas pamatytų efektą, tada pereinam į grotuvą
                    setTimeout(() => {
                        video.srcObject.getTracks().forEach(track => track.stop());
                        videoContainer.style.display = 'none';
                        controls.style.display = 'block';
                        visualizerCanvas.style.display = 'block';
                        timerElement.style.display = 'block';
                        timerElement.textContent = "0:00";

                        audioElement.src = barcode.rawValue;
                        audioElement.load();

                        grotiButton.classList.remove('stabdyti');
                        grotiButton.classList.add('groti');
                        grotiButton.textContent = "Groti";
                    }, 600);

                    break;
                }
            })
            .catch(err => {
                console.error("QR kodo nuskaitymo klaida:", err);
            });
    }

    // Laikmačio atnaujinimas
    audioElement.addEventListener('timeupdate', () => {
        const minutes = Math.floor(audioElement.currentTime / 60);
        const seconds = Math.floor(audioElement.currentTime % 60);
        // Pridedame 0 priekyje, jei sekundžių mažiau nei 10
        timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    });

    // Pabaigus groti dainai atstatyti mygtuką
    audioElement.addEventListener('ended', () => {
        muzikaGroja = false;
        grotiButton.classList.remove('stabdyti');
        grotiButton.classList.add('groti');
        grotiButton.textContent = "Groti";
        cancelAnimationFrame(visualizerAnimationId);
        canvasContext.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        timerElement.textContent = "0:00";
    });

    // Vizualizacija (kaip nuotraukoje)
    function drawVisualizer() {
        if (!muzikaGroja) return;

        visualizerCanvas.width = window.innerWidth;
        visualizerCanvas.height = window.innerHeight * 0.6; // Užima 60% ekrano apačios

        const WIDTH = visualizerCanvas.width;
        const HEIGHT = visualizerCanvas.height;
        const centerY = HEIGHT * 0.65; // Pagrindinės linijos aukštis

        canvasContext.clearRect(0, 0, WIDTH, HEIGHT);

        analyser.getByteFrequencyData(dataArray);

        // Nupiešiame centrinę švytinčią liniją
        canvasContext.shadowBlur = 15;
        canvasContext.shadowColor = '#00d2ff';
        canvasContext.fillStyle = '#ffffff';
        canvasContext.fillRect(0, centerY, WIDTH, 2);
        canvasContext.shadowBlur = 0; // Nuimame šešėlį stulpeliams

        // Apskaičiuojame stulpelių plotį
        const barWidth = (WIDTH / bufferLength) * 2.5; 
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
            // Ignoruojame pačius tyliausius dažnius ir pritaikome aukščio mastelį
            let barHeight = (dataArray[i] / 255) * (HEIGHT * 0.5);
            
            if (barHeight > 0) {
                // Viršutinis stulpelis (pagrindinis)
                const grad = canvasContext.createLinearGradient(0, centerY, 0, centerY - barHeight);
                grad.addColorStop(0, '#ffffff'); // Balta prie ašies
                grad.addColorStop(0.2, '#00d2ff'); // Žydra
                grad.addColorStop(1, '#0022aa'); // Tamsiai mėlyna viršuje

                canvasContext.fillStyle = grad;
                
                // Nupiešiame užapvalintus stulpelius (naudojant rect, bet padarant tarpus)
                canvasContext.fillRect(x, centerY - barHeight, barWidth - 4, barHeight);

                // Apatinis stulpelis (atspindys)
                canvasContext.globalAlpha = 0.4; // Atspindys blankesnis
                const reflectGrad = canvasContext.createLinearGradient(0, centerY, 0, centerY + (barHeight * 0.6));
                reflectGrad.addColorStop(0, '#ffffff');
                reflectGrad.addColorStop(0.2, '#00d2ff');
                reflectGrad.addColorStop(1, '#0022aa');
                
                canvasContext.fillStyle = reflectGrad;
                canvasContext.fillRect(x, centerY + 2, barWidth - 4, barHeight * 0.6);
                canvasContext.globalAlpha = 1.0; // Atstatome permatomumą
            }
            x += barWidth;
        }

        visualizerAnimationId = requestAnimationFrame(drawVisualizer);
    }

    // Groti arba stabdyti
    grotiButton.addEventListener('click', () => {
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }

        if (muzikaGroja) {
            audioElement.pause();
            muzikaGroja = false;
            grotiButton.classList.remove('stabdyti');
            grotiButton.classList.add('groti');
            grotiButton.textContent = "Groti";
            cancelAnimationFrame(visualizerAnimationId);
            // Išvalome ekraną sustabdžius
            canvasContext.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        } else {
            audioElement.play()
            .then(() => {
                muzikaGroja = true;
                grotiButton.classList.remove('groti');
                grotiButton.classList.add('stabdyti');
                grotiButton.textContent = "Stabdyti";
                drawVisualizer(); // Paleidžiame vizualizaciją
            })
            .catch(err => {
                console.error("Garso paleidimo klaida:", err);
                alert("Nepavyko paleisti garso failo.");
            });
        }
    });

    // Skanuoti iš naujo
    skanavimasIsNaujo.addEventListener('click', () => {
        controls.style.display = 'none';
        visualizerCanvas.style.display = 'none';
        timerElement.style.display = 'none';
        videoContainer.style.display = 'block';

        if (muzikaGroja) {
            audioElement.pause();
            muzikaGroja = false;
            cancelAnimationFrame(visualizerAnimationId);
        }
        audioElement.currentTime = 0;
        timerElement.textContent = "0:00";

        // Atstatome taikinį į pradinę būseną
        target.classList.remove('scanned');

        pradetiVideo();
    });

    // Stebėti QR kodus kas 300ms, kad per daug neapkrautume telefono procesoriaus
    setInterval(detectCode, 300);
  </script>
</body>
</html>
